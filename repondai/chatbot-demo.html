<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Démo Chatbot — Plomberie Martin</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=Mulish:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0F1117;
    --surface: #1A1D27;
    --surface2: #22263A;
    --blue: #4F7EFF;
    --blue-light: #7BA3FF;
    --green: #2ECC71;
    --text: #E8EAF0;
    --muted: #6B7280;
    --border: rgba(255,255,255,0.07);
  }

  body {
    font-family: 'Mulish', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
    position: relative;
    overflow: hidden;
  }

  /* Background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(79,126,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(79,126,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  /* Glow */
  body::after {
    content: '';
    position: fixed;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(79,126,255,0.08) 0%, transparent 70%);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
  }

  .demo-wrapper {
    width: 100%;
    max-width: 420px;
    position: relative;
    z-index: 1;
    animation: fadeIn 0.5s ease forwards;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Badge */
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(79,126,255,0.12);
    border: 1px solid rgba(79,126,255,0.25);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 0.72rem;
    color: var(--blue-light);
    font-family: 'Syne', sans-serif;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 1rem;
  }

  .badge::before {
    content: '';
    width: 6px; height: 6px;
    background: var(--green);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* Chat window */
  .chat-window {
    background: var(--surface);
    border-radius: 20px;
    border: 1px solid var(--border);
    overflow: hidden;
    box-shadow: 0 30px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.04);
  }

  .chat-header {
    background: var(--surface2);
    padding: 1rem 1.2rem;
    display: flex;
    align-items: center;
    gap: 0.8rem;
    border-bottom: 1px solid var(--border);
  }

  .avatar {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--blue), #8B5CF6);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1rem;
    flex-shrink: 0;
  }

  .chat-header-info { flex: 1; }

  .chat-header-name {
    font-family: 'Syne', sans-serif;
    font-size: 0.9rem;
    font-weight: 600;
    color: var(--text);
  }

  .chat-header-status {
    font-size: 0.72rem;
    color: var(--green);
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .chat-header-status::before {
    content: '';
    width: 5px; height: 5px;
    background: var(--green);
    border-radius: 50%;
  }

  .powered {
    font-size: 0.65rem;
    color: var(--muted);
    font-family: 'Syne', sans-serif;
  }

  /* Messages */
  .messages {
    height: 340px;
    overflow-y: auto;
    padding: 1.2rem;
    display: flex;
    flex-direction: column;
    gap: 0.8rem;
    scroll-behavior: smooth;
  }

  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .msg {
    display: flex;
    gap: 0.6rem;
    animation: msgIn 0.3s ease forwards;
    opacity: 0;
    transform: translateY(8px);
  }

  @keyframes msgIn {
    to { opacity: 1; transform: translateY(0); }
  }

  .msg.user { flex-direction: row-reverse; }

  .msg-avatar {
    width: 28px; height: 28px;
    border-radius: 8px;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.8rem;
  }

  .msg.bot .msg-avatar {
    background: linear-gradient(135deg, var(--blue), #8B5CF6);
  }

  .msg.user .msg-avatar {
    background: var(--surface2);
    border: 1px solid var(--border);
  }

  .msg-bubble {
    max-width: 78%;
    padding: 0.65rem 0.9rem;
    border-radius: 14px;
    font-size: 0.875rem;
    line-height: 1.5;
    color: var(--text);
  }

  .msg.bot .msg-bubble {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-top-left-radius: 4px;
  }

  .msg.user .msg-bubble {
    background: var(--blue);
    border-top-right-radius: 4px;
    color: white;
  }

  /* Typing indicator */
  .typing {
    display: flex;
    gap: 0.6rem;
    align-items: flex-end;
  }

  .typing-dots {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 14px;
    border-top-left-radius: 4px;
    padding: 0.75rem 1rem;
    display: flex;
    gap: 4px;
    align-items: center;
  }

  .typing-dots span {
    width: 6px; height: 6px;
    background: var(--muted);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }

  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-5px); }
  }

  /* Quick replies */
  .quick-replies {
    padding: 0 1.2rem 0.8rem;
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
  }

  .qr-btn {
    padding: 0.4rem 0.8rem;
    background: transparent;
    border: 1px solid rgba(79,126,255,0.3);
    border-radius: 20px;
    color: var(--blue-light);
    font-family: 'Mulish', sans-serif;
    font-size: 0.78rem;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .qr-btn:hover {
    background: rgba(79,126,255,0.12);
    border-color: var(--blue);
  }

  /* Input */
  .chat-input {
    padding: 0.8rem 1.2rem 1.2rem;
    display: flex;
    gap: 0.6rem;
    border-top: 1px solid var(--border);
  }

  .chat-input input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 0.7rem 1rem;
    color: var(--text);
    font-family: 'Mulish', sans-serif;
    font-size: 0.875rem;
    outline: none;
    transition: border-color 0.2s;
  }

  .chat-input input::placeholder { color: var(--muted); }
  .chat-input input:focus { border-color: rgba(79,126,255,0.4); }

  .send-btn {
    width: 40px; height: 40px;
    background: var(--blue);
    border: none;
    border-radius: 10px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
    align-self: flex-end;
  }

  .send-btn:hover { background: var(--blue-light); transform: scale(1.05); }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .send-btn svg { width: 16px; height: 16px; fill: white; }

  /* Lead capture */
  .lead-capture {
    background: linear-gradient(135deg, rgba(79,126,255,0.1), rgba(139,92,246,0.1));
    border: 1px solid rgba(79,126,255,0.2);
    border-radius: 12px;
    padding: 0.8rem;
    margin-top: 0.4rem;
  }

  .lead-capture p {
    font-size: 0.78rem;
    color: var(--muted);
    margin-bottom: 0.6rem;
  }

  .lead-capture input {
    width: 100%;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.5rem 0.7rem;
    color: var(--text);
    font-family: 'Mulish', sans-serif;
    font-size: 0.8rem;
    outline: none;
    margin-bottom: 0.4rem;
  }

  .lead-btn {
    width: 100%;
    padding: 0.5rem;
    background: var(--blue);
    border: none;
    border-radius: 8px;
    color: white;
    font-family: 'Mulish', sans-serif;
    font-size: 0.8rem;
    cursor: pointer;
    transition: background 0.2s;
  }

  .lead-btn:hover { background: var(--blue-light); }

  /* Footer note */
  .demo-note {
    text-align: center;
    font-size: 0.72rem;
    color: var(--muted);
    margin-top: 0.8rem;
    font-family: 'Syne', sans-serif;
    letter-spacing: 0.05em;
  }
</style>
</head>
<body>

<div class="demo-wrapper">
  <div class="badge">Démo live — Plomberie Martin</div>

  <div class="chat-window">
    <div class="chat-header">
      <div class="avatar">🔧</div>
      <div class="chat-header-info">
        <div class="chat-header-name">Assistant Plomberie Martin</div>
        <div class="chat-header-status">Disponible 24h/24</div>
      </div>
      <div class="powered">IA</div>
    </div>

    <div class="messages" id="messages"></div>

    <div class="quick-replies" id="quickReplies">
      <button class="qr-btn" onclick="sendQuick('Quels sont vos tarifs ?')">💶 Tarifs</button>
      <button class="qr-btn" onclick="sendQuick('Urgence fuite d\'eau')">🚨 Urgence</button>
      <button class="qr-btn" onclick="sendQuick('Prendre un rendez-vous')">📅 RDV</button>
      <button class="qr-btn" onclick="sendQuick('Zone d\'intervention ?')">📍 Zone</button>
    </div>

    <div class="chat-input">
      <input type="text" id="userInput" placeholder="Posez votre question..." onkeydown="if(event.key==='Enter') sendMessage()">
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>

  <div class="demo-note">⚡ Propulsé par Claude AI — Répond instantanément à vos clients</div>
</div>

<script>
const SYSTEM_PROMPT = `Tu es l'assistant virtuel de "Plomberie Martin", une entreprise de plomberie basée à Dunkerque.

Infos sur l'entreprise :
- Nom : Plomberie Martin
- Spécialités : dépannage urgent, installation sanitaire, chauffe-eau, fuites
- Zone d'intervention : Dunkerque et 30km autour
- Tarifs : déplacement 50€, main d'œuvre 60€/h, urgence nuit +50%
- Disponibilité : Lun-Sam 8h-19h, urgences 24h/24
- Téléphone : 03 28 XX XX XX

Ton rôle :
- Répondre aux questions des clients de façon claire et rassurante
- Pour les urgences, rassurer et donner le numéro d'urgence
- Pour les devis, collecter le type de problème et proposer un rappel
- Être chaleureux, professionnel, concis (2-3 phrases max par réponse)
- Toujours en français
- Si le client veut un devis ou RDV, lui demander son prénom et numéro de téléphone`;

let messages = [];
let isTyping = false;

function addMessage(role, content, isLead = false) {
  messages.push({ role, content });
  const container = document.getElementById('messages');

  const msgDiv = document.createElement('div');
  msgDiv.className = `msg ${role === 'user' ? 'user' : 'bot'}`;

  const avatarDiv = document.createElement('div');
  avatarDiv.className = 'msg-avatar';
  avatarDiv.textContent = role === 'user' ? '👤' : '🔧';

  const bubbleDiv = document.createElement('div');
  bubbleDiv.className = 'msg-bubble';

  if (isLead) {
    bubbleDiv.innerHTML = content + `
      <div class="lead-capture">
        <p>Laissez vos coordonnées pour être rappelé :</p>
        <input type="text" id="leadName" placeholder="Votre prénom">
        <input type="tel" id="leadPhone" placeholder="Votre téléphone" style="margin-top:0.4rem">
        <button class="lead-btn" onclick="submitLead()" style="margin-top:0.4rem">Envoyer →</button>
      </div>`;
  } else {
    bubbleDiv.textContent = content;
  }

  msgDiv.appendChild(avatarDiv);
  msgDiv.appendChild(bubbleDiv);
  container.appendChild(msgDiv);
  container.scrollTop = container.scrollHeight;
}

function showTyping() {
  const container = document.getElementById('messages');
  const typingDiv = document.createElement('div');
  typingDiv.className = 'typing';
  typingDiv.id = 'typing';
  typingDiv.innerHTML = `
    <div class="msg-avatar" style="width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,#4F7EFF,#8B5CF6);display:flex;align-items:center;justify-content:center;font-size:0.8rem;flex-shrink:0;">🔧</div>
    <div class="typing-dots"><span></span><span></span><span></span></div>`;
  container.appendChild(typingDiv);
  container.scrollTop = container.scrollHeight;
}

function hideTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

async function callClaude(userMessage) {
  const apiMessages = messages.map(m => ({ role: m.role, content: m.content }));

  const response = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1000,
      system: SYSTEM_PROMPT,
      messages: apiMessages
    })
  });

  const data = await response.json();
  return data.content[0].text;
}

async function sendMessage() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text || isTyping) return;

  input.value = '';
  document.getElementById('quickReplies').style.display = 'none';
  document.getElementById('sendBtn').disabled = true;
  isTyping = true;

  addMessage('user', text);
  showTyping();

  try {
    const reply = await callClaude(text);
    hideTyping();

    // Detect if lead capture needed
    const needsLead = reply.toLowerCase().includes('prénom') || reply.toLowerCase().includes('téléphone') || reply.toLowerCase().includes('rappel');
    addMessage('assistant', reply, needsLead);
  } catch (e) {
    hideTyping();
    addMessage('assistant', "Désolé, une erreur est survenue. Appelez-nous directement au 03 28 XX XX XX.");
  }

  isTyping = false;
  document.getElementById('sendBtn').disabled = false;
  document.getElementById('userInput').focus();
}

function sendQuick(text) {
  document.getElementById('userInput').value = text;
  sendMessage();
}

function submitLead() {
  const name = document.getElementById('leadName')?.value;
  const phone = document.getElementById('leadPhone')?.value;
  if (!name || !phone) return;

  // In production: send to Make.com webhook
  const leadCapture = document.querySelector('.lead-capture');
  if (leadCapture) {
    leadCapture.innerHTML = `<p style="color:#2ECC71;font-size:0.8rem;">✅ Merci ${name} ! M. Martin vous rappelle dans les meilleurs délais.</p>`;
  }
}

// Initial greeting
window.addEventListener('load', () => {
  setTimeout(() => {
    addMessage('assistant', 'Bonjour ! 👋 Je suis l\'assistant de Plomberie Martin. Comment puis-je vous aider ? Urgence, devis, prise de rendez-vous...');
  }, 400);
});
</script>
</body>
</html>
